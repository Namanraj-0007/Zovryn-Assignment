version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://root:example@mongo:27017/finance_db?authSource=admin
      - JWT_SECRET=supersecretkeyforcompanydemo
    depends_on:
      - mongo
    command: npm start

volumes:
  mongo_data:

